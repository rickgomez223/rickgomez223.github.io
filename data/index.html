<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FH6 Telemetry Dump</title>
    <style>
        /* Container forced to your exact resolution */
        body {
            width: 1270px;
            height: 700px;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            background: #111;
            color: #0f0;
            font-family: 'Segoe UI', monospace;
            transform-origin: top left; /* Critical for scaling */
            box-sizing: border-box;
        }

        #data-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
        }
        .prop-row { 
            border: 1px solid #333; 
            padding: 5px; 
            font-size: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <h1>FH6 Live Telemetry (1270x700)</h1>
    <div id="data-container"></div>

    <script>
        const PC_IP = "192.168.50.192";
        const socket = new WebSocket(`ws://${PC_IP}:8888/telemetry`);

        const container = document.getElementById('data-container');

        // Scaling logic
        function fitToWindow() {
            const scale = Math.min(window.innerWidth / 1270, window.innerHeight / 700);
            document.body.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', fitToWindow);
        fitToWindow();

        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);

            // Clear container and rebuild based on the new data object
            container.innerHTML = '';
            for (let key in data) {
                let div = document.createElement('div');
                div.className = 'prop-row';
                div.innerHTML = `<strong>${key}</strong>: ${data[key]}`;
                container.appendChild(div);
            }
        };

        socket.onopen = () => console.log("Connected to SimHub Telemetry");
        socket.onerror = (err) => console.error("Connection failed. Check your IP/Firewall.", err);
    </script>
</body>
</html>
